name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run Python tests
        run: python -m pytest skills/blog-brainstorm/scripts/tests skills/tech-blog-orchestrator/scripts/tests

      - name: Check release versions
        run: python scripts/check_versions.py

      - name: Check router and command sync
        run: python scripts/check_router_sync.py
